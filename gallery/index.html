<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日AI壁纸画廊 | Daily AI Wallpaper Gallery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Noto Serif SC', 'Georgia', serif;
    min-height: 100vh;
  }

  .hero {
    text-align: center;
    padding: 80px 20px 60px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at center, rgba(120,80,200,0.08) 0%, transparent 70%);
    animation: breathe 8s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .hero h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 300;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, #c9a8ff, #80d0ff, #a8ffc9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
    z-index: 1;
  }
  .hero .subtitle {
    margin-top: 16px;
    font-size: 1.1rem;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
    letter-spacing: 0.05em;
    position: relative;
    z-index: 1;
  }
  .hero .stats {
    margin-top: 24px;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.3);
    position: relative;
    z-index: 1;
  }

  .gallery {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(580px, 1fr));
    gap: 40px 24px;
  }

  .card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 40px rgba(120,80,200,0.08);
    border-color: rgba(255,255,255,0.12);
  }
  .card-image {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    display: block;
    transition: transform 0.6s ease;
  }
  .card:hover .card-image {
    transform: scale(1.02);
  }
  .card-info {
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .card-title {
    font-size: 1.05rem;
    font-weight: 400;
    color: #d0d0d0;
    line-height: 1.5;
  }
  .card-meta {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
  }
  .tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .tag-art { background: rgba(200,150,255,0.1); border-color: rgba(200,150,255,0.25); color: #c8a0ff; }
  .tag-photo { background: rgba(100,200,255,0.1); border-color: rgba(100,200,255,0.25); color: #60c0ff; }
  .tag-digital { background: rgba(100,255,180,0.1); border-color: rgba(100,255,180,0.25); color: #60ffb0; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    cursor: pointer;
    justify-content: center;
    align-items: center;
    padding: 40px;
  }
  .modal-overlay.active { display: flex; }
  .modal-image {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 0 80px rgba(0,0,0,0.6);
  }

  footer {
    text-align: center;
    padding: 60px 20px;
    color: rgba(255,255,255,0.2);
    font-size: 0.8rem;
    letter-spacing: 0.05em;
  }

  @media (max-width: 640px) {
    .gallery {
      grid-template-columns: 1fr;
      gap: 24px;
      padding: 12px;
    }
    .card-image { aspect-ratio: 16 / 9; }
    .hero { padding: 60px 16px 40px; }
  }
</style>
</head>
<body>

<div class="hero">
  <h1>每日AI壁纸画廊</h1>
  <div class="subtitle">Daily AI Wallpaper Gallery — 1600万种可能，每天一幅神作</div>
  <div class="stats" id="stats">加载中...</div>
</div>

<div class="gallery" id="gallery"></div>

<div class="modal-overlay" id="modal" onclick="this.classList.remove('active')">
  <img class="modal-image" id="modalImg" src="" alt="">
</div>

<footer>
  <p>Powered by Tencent HunYuan · 自动生成于 WorkBuddy</p>
</footer>

<script>
const tagClassMap = {
  art: 'tag-art',
  photo: 'tag-photo',
  digital: 'tag-digital'
};

function openModal(src) {
  document.getElementById('modalImg').src = src;
  document.getElementById('modal').classList.add('active');
}

function buildGallery(wallpapers) {
  const container = document.getElementById('gallery');
  container.innerHTML = '';
  wallpapers.forEach(w => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img class="card-image" src="${w.src}" alt="${w.title}" loading="lazy" onclick="openModal('${w.src}')">
      <div class="card-info">
        <div class="card-title">${w.title}<br><span class="tag ${tagClassMap[w.styleTag]}">${w.style}</span></div>
        <div class="card-meta">${w.date}</div>
      </div>
    `;
    container.appendChild(card);
  });
  document.getElementById('stats').textContent = `共 ${wallpapers.length} 幅壁纸 · 每天 9:00 自动更新`;
}

fetch('wallpapers.json')
  .then(r => r.json())
  .then(buildGallery)
  .catch(() => {
    document.getElementById('stats').textContent = '加载失败，请刷新页面重试';
  });
</script>

</body>
</html>
